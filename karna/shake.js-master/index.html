<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHAKE</title>
    <!-- <link href=""> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css">
  </head>
  <body>
    <div class="text-center">
        <h1>SHAKE</h1>
    </div>
    <div>
        <!-- Button trigger modal -->
  <button type="button" style="display: none;" id="sayangf" data-bs-toggle="modal" data-bs-target="#exampleModal">
  </button>
  
  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">FERREN ,AKU SAYANG FERREN</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <img src="./a.png" class="img-fluid" alt="SAYANG FERREN">
        </div>
        <div class="modal-footer">
        </div>
      </div>
    </div>
  </div>
    </div>
    <div>
        <audio id="myAudio">
            <!-- <source src="horse.ogg" type="audio/ogg"> -->
            <source src="./al.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="shake.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            var myShakeEvent = new Shake({
                threshold: 15
            });
            myShakeEvent.start();
            window.addEventListener('shake', shakeEventDidOccur, false);
            function shakeEventDidOccur () {
                // alert('Shake!');
                playAudio();
                document.getElementById("sayangf").click()
                setTimeout(() => {
                    pauseAudio();
                }, 1500);
            }
        
            var x = document.getElementById("myAudio"); 
              function playAudio() { 
                x.play(); 
              } 
              
              function pauseAudio() { 
                x.pause(); 
              } 
        };
        </script>
  </body>
</html>
