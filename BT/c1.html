<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tes1</title>
        <!-- bootrap 5 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- include aos css -->
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        <!-- include owl courosel  -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"/>
        <!-- include font awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
        <!-- include css -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
        <link rel="stylesheet" href="inpos.css">
    </head>
    <body>
        <div data-aos="fade-up" id="head" class="welcome">
            <div class="row">
                <div class="col-12">
                    <h1 id="sayhello">Hallo</h1>
                    <h2 id="udangan"> FERREN ANDREA</h2>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <h3 id="entergate" class="btn btn-outline-primary" onClick="play()">Masuk</h3>
                </div>
            </div>            
        </div>
        <div id="clider" data-aos="fade-up">
            <div class="owl-carousel owl-theme">
                <div class="item">
                    <div class="pass" style="background: url('./Assets/SLIDER/sl3.jpg');">
                        <h2>Dunia Terpesona</h2>
                    </div>
                </div>
                <div class="item">
                    <div class="pass" style="background: url('./Assets/SLIDER/sl2.jpg');">
                        <h2>Dunia Terpesona</h2>
                    </div>
                </div>
                <div class="item">
                    <div class="pass" style="background: url('./Assets/SLIDER/sl1.jpg');">
                        <h2>Dunia Terpesona</h2>
                    </div>
                </div>
            </div>
        </div>
        <div id="profile" data-aos="fade-up">
            <div class="row">
                <div class="col-12 text-center">
                        <img id="ppc" src="./Assets/pp.jpg" class="rounded-circle border border-light">
                </div>
            </div>
        </div>
        <!-- audio play -->
        <audio id="bg" src="./audio/bg.mp3" autoplay loop></audio>

        <!-- bootrap js -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- include ajax -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <!-- include aos js -->
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <!-- include owl courosel  -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
        
        
        <script>
            AOS.init();
            $('.owl-carousel').owlCarousel({
                loop:true,
                margin:0,
                autoplay:true,
                pagination: false,
                dots:false,
                animateIn: 'fadeIn',
                animateOut: 'fadeOut',
                responsive:{
                    0:{
                        items:1
                    },
                    600:{
                        items:1
                    },
                    1000:{
                        items:1
                    }
                }
            })
            // play audio
            function play() {
                var audio = new Audio('./audio/bg.mp3');
                audio.play();
                // scroll 100vh
                window.scrollBy(0, window.innerHeight);
            }
            // enter gate
        </script>
    </body>
</html>
